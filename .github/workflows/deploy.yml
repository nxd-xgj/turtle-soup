# ============================================
# 海龟汤推理馆 — 自动部署到 InfinityFree FTP
#
# 工作流程：
# 1. 推送代码到 GitHub main 分支
# 2. 自动通过 FTP 同步到 InfinityFree 服务器
# 3. 触发后约 30 秒内完成部署
# ============================================

name: 🚀 自动部署到 InfinityFree

on:
  push:
    branches:
      - main          # push 到 main 分支时自动部署
      - master        # push 到 master 分支时也触发
  workflow_dispatch:   # 也支持手动触发

jobs:
  deploy:
    name: 📦 FTP 同步
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 📋 显示将要部署的文件
        run: |
          echo "=== 文件清单 ==="
          find . -type f -not -path './.git/*' -not -path './.github/*' | sort
          echo "================"
          echo "共 $(find . -type f -not -path './.git/*' -not -path './.github/*' | wc -l) 个文件"

      - name: 📤 FTP 同步到 InfinityFree
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}
          protocol: ftp
          local-dir: ./                          # 从仓库根目录
          server-dir: /htdocs/turtle-soup/       # 部署到 htdocs 的子目录
          dangerous-clean-slate: false            # 不清除服务器已有文件
          exclude: |
            **/.git*
            **/.git/**                            # 不推送 .git
            **/.github/**                         # 不推送 workflow 配置
            .gitignore
            init-deploy.sh
            README.md

      - name: ✅ 部署完成
        run: |
          echo "=============================="
          echo "  ✅ 部署完成！"
          echo "  🌐 https://turtlesoup.free.nf"
          echo "=============================="
