# ============================================
# 海龟汤推理馆 — 自动部署到 InfinityFree FTP
#
# 工作流程：
# 1. 推送代码到 GitHub main 分支
# 2. 自动通过 FTPS 同步到 InfinityFree 服务器
# 3. 触发后约 30 秒内完成部署
#
# 首次部署前需在 GitHub 仓库设置以下 Secrets：
#   FTP_HOST      → ftpupload.net
#   FTP_USER      → if0_42327900
#   FTP_PASSWORD  → (你的 FTP 密码)
#   FTP_PORT      → 21
# ============================================

name: 🚀 自动部署到 InfinityFree

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: 📦 FTPS 同步
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 📋 文件清单预览
        run: |
          echo "=== 待部署文件 ==="
          find . -type f -not -path './.git/*' -not -path './.github/*' \
                   -not -name '.gitignore' \
                   -not -name 'config.php' \
                   -not -name 'README.md' \
                   -not -name 'init-deploy.sh' | sort
          echo "======================"

      - name: 🔧 安装 lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp 2>&1 | tail -3

      - name: 📤 FTPS 同步到 InfinityFree
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          # 生成要排除的文件列表
          EXCLUDE=".git|.gitignore|config.php|init-deploy.sh|README.md"
          
          echo "📡 连接到 $FTP_HOST ..."
          lftp -c "
            set ftp:ssl-force true
            set ftp:ssl-protect-data true
            set ssl:verify-certificate no
            set net:max-retries 3
            set net:timeout 30
            open -p $FTP_PORT -u \"$FTP_USER\",\"$FTP_PASSWORD\" $FTP_HOST
            
            # 先进入 htdocs 目录
            cd htdocs
            echo '📂 当前远程目录:' 
            pwd
            
            echo '✅ 连接成功，开始同步...'
            
            # 镜像上传：把本地当前目录同步到远程 /htdocs/
            mirror --reverse \
              --verbose \
              --exclude-glob .git \
              --exclude-glob .gitignore \
              --exclude-glob config.php \
              --exclude-glob init-deploy.sh \
              --exclude-glob README.md \
              --exclude-glob .github \
              --exclude-glob .git/ \
              . .
            
            echo ''
            echo '✅ 同步后的 /htdocs 内容:'
            ls -la
          "

      - name: 🎯 部署报告
        run: |
          echo "=============================="
          echo "  ✅ 部署到 InfinityFree 完成"
          echo "  📂 同步至: /htdocs/（网站根目录）"
          echo "  ⚡ 使用 lftp + FTPS (TLS)"
          echo "  ⚠️  生产环境 config.php 未被覆盖"
          echo "=============================="
