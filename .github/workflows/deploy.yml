# ============================================
# 海龟汤推理馆 — 自动部署到 InfinityFree FTP
#
# 工作流程：
# 1. 推送代码到 GitHub main 分支
# 2. 自动通过 FTP 同步到 InfinityFree 服务器
# 3. 触发后约 30 秒内完成部署
#
# 首次部署前需在 GitHub 仓库设置以下 Secrets：
#   FTP_HOST      → ftpupload.net
#   FTP_USER      → if0_42327900
#   FTP_PASSWORD  → (你的 FTP 密码)
#   FTP_PORT      → 21
# ============================================

name: 🚀 自动部署到 InfinityFree

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: 📦 FTP 同步
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 📋 文件清单预览
        run: |
          echo "=== 待部署文件 ==="
          find . -type f -not -path './.git/*' -not -path './.github/*' \
                   -not -name '.gitignore' \
                   -not -name 'config.php' \
                   -not -name 'README.md' \
                   -not -name 'init-deploy.sh' | sort
          echo "======================"

      - name: 📤 FTP 同步到 InfinityFree
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftp
          local-dir: ./
          server-dir: /htdocs/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git/**
            **/.github/**
            .gitignore
            config.php
            init-deploy.sh
            README.md

      - name: 🎯 部署报告
        run: |
          echo "=============================="
          echo "  ✅ 部署到 InfinityFree 完成"
          echo "  📂 位置: /htdocs/（网站根目录）"
          echo "  ⚠️  注意: 生产环境的 config.php"
          echo "     已在服务器保留，未被覆盖"
          echo "=============================="
